spring.application.name=FdarnaCuisine

# Profil fly
# - Par défaut (si tu n'as pas encore configuré une DB externe sur Fly), on démarre en H2 en mémoire.
# - Si tu définis SPRING_DATASOURCE_URL/USERNAME/PASSWORD sur Fly, l'app utilisera ta DB externe.
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:h2:mem:fdarnacuisine;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:sa}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.h2.Driver}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

# Pool de connexions Hikari pour la prod
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000

# Tuning Tomcat pour mieux encaisser la charge
server.tomcat.threads.max=200
server.tomcat.threads.min-spare=10
server.tomcat.accept-count=100

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

# Actuator / monitoring (à exposer derrière un proxy / sécurisé)
management.endpoints.web.exposure.include=health,info,metrics
management.endpoint.health.probes.enabled=true
management.health.livenessstate.enabled=true
management.health.readinessstate.enabled=true

